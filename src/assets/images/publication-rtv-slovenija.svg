<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 195 540 210" role="img">
  <title>RTV Slovenija</title>
  <defs>
    <filter id="invert" color-interpolation-filters="sRGB">
      <feComponentTransfer>
        <feFuncR type="table" tableValues="1 0"/>
        <feFuncG type="table" tableValues="1 0"/>
        <feFuncB type="table" tableValues="1 0"/>
      </feComponentTransfer>
    </filter>
    <mask id="logo-mask" mask-type="luminance">
      <image width="600" height="600" filter="url(#invert)" href="data:image/png;base64,"/>
    </mask>
  </defs>
  <rect width="600" height="600" fill="#fff" mask="url(#logo-mask)"/>
</svg>
